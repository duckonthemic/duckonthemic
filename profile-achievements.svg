<svg xmlns="http://www.w3.org/2000/svg" width="760" height="230" viewBox="0 0 760 230" role="img" aria-label="Profile achievements">
  <style>
    .panel { fill: #f6f8fa; stroke: #d0d7de; }
    .title { fill: #24292f; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #24292f; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .value { fill: #57606a; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .meta { fill: #6e7781; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .accent { fill: #0969da; }
    .accent-soft { fill: #ddf4ff; }
    @media (prefers-color-scheme: dark) {
      .panel { fill: #0d1117; stroke: #30363d; }
      .title, .label { fill: #f0f6fc; }
      .value { fill: #c9d1d9; }
      .meta { fill: #8b949e; }
      .accent { fill: #58a6ff; }
      .accent-soft { fill: #102a43; }
    }
  </style>

  <rect class="panel" x="1" y="1" width="758" height="228" rx="12"/>
  <text class="title" x="32" y="42">Selected Achievements</text>
  <text class="meta" x="32" y="64">A focused snapshot of build activity, tooling, and current direction.</text>

  <g transform="translate(32 88)">
    <rect class="panel" x="0" y="0" width="330" height="54" rx="8"/>
    <circle class="accent-soft" cx="28" cy="27" r="14"/>
    <path class="accent" d="M22 25h12v4H22zM24 19h8v4h-8zM26 31h4v4h-4z"/>
    <text class="label" x="56" y="23">Developer</text>
    <text class="value" x="56" y="42">19 public repositories, 17 original projects</text>
  </g>

  <g transform="translate(398 88)">
    <rect class="panel" x="0" y="0" width="330" height="54" rx="8"/>
    <circle class="accent-soft" cx="28" cy="27" r="14"/>
    <path class="accent" d="M21 20h14v4H21zM21 26h14v4H21zM21 32h9v4h-9z"/>
    <text class="label" x="56" y="23">Builder</text>
    <text class="value" x="56" y="42">JavaScript, Python, SQL, and modern web tooling</text>
  </g>

  <g transform="translate(32 154)">
    <rect class="panel" x="0" y="0" width="330" height="54" rx="8"/>
    <circle class="accent-soft" cx="28" cy="27" r="14"/>
    <path class="accent" d="M27 17h3v8h8v3h-8v8h-3v-8h-8v-3h8z"/>
    <text class="label" x="56" y="23">Automator</text>
    <text class="value" x="56" y="42">GitHub Actions keeps this profile fresh</text>
  </g>

  <g transform="translate(398 154)">
    <rect class="panel" x="0" y="0" width="330" height="54" rx="8"/>
    <circle class="accent-soft" cx="28" cy="27" r="14"/>
    <path class="accent" d="M28 17a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 3a7 7 0 0 1 6.33 4H21.67A7 7 0 0 1 28 20zm0 14a7 7 0 0 1-6.33-4h12.66A7 7 0 0 1 28 34z"/>
